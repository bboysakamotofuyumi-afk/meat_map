<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tokyo Carnivore Meat Map - Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --accent: #f97316;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 20%, rgba(249, 115, 22, 0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(14, 165, 233, 0.1), transparent 30%),
                  var(--bg);
      color: var(--text);
      font-family: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app { display: grid; grid-template-rows: auto 1fr; height: 100%; }
    header {
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: center;
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.7));
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .title {
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    .chip {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .chip strong { color: var(--text); }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }
    .control input { accent-color: var(--accent); }
    .control-input {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      min-width: 220px;
      outline: none;
    }
    .control-select {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      min-width: 180px;
      outline: none;
    }
    .control-button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(249, 115, 22, 0.35);
    }
    .control-button:active { transform: translateY(1px); }
    .select {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      min-width: 160px;
      outline: none;
    }
    .drawer {
      position: fixed;
      left: 14px;
      bottom: 14px;
      width: 320px;
      max-height: 60vh;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.45);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .drawer-title { font-weight: 700; color: var(--text); }
    .drawer-list {
      overflow-y: auto;
      padding: 8px 0;
    }
    .list-item {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
    }
    .list-item:hover { background: rgba(255,255,255,0.04); }
    .list-name { font-weight: 700; }
    .list-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #0f172a;
      font-weight: 700;
      margin-top: 6px;
    }
    #map { width: 100%; height: 100%; }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .legend {
      position: fixed;
      right: 14px;
      bottom: 14px;
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .legend-title {
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--muted);
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: inline-block;
    }
    .legend-label {
      width: 16px;
      font-weight: 700;
      text-align: center;
    }
    .legend-count {
      margin-left: auto;
      color: var(--muted);
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="title">Tokyo Carnivore Meat Map (Leaflet Demo)</div>
      <div class="chip">CSV: <strong id="csv-label">loading…</strong></div>
      <div class="chip">Markers: <strong id="count-label">0</strong></div>
      <div class="chip">Updated: <strong id="updated-label">-</strong></div>
      <div class="controls">
        <label class="control"><input type="checkbox" data-rank="S" checked>S</label>
        <label class="control"><input type="checkbox" data-rank="A" checked>A</label>
        <label class="control"><input type="checkbox" data-rank="B">B</label>
        <label class="control"><input type="checkbox" data-rank="C">C</label>
      </div>
      <div class="controls">
        <input id="search-box" class="control-input" type="search" placeholder="店名/住所/ジャンルで検索">
        <select id="genre-select" class="control-select">
          <option value="">ジャンル: すべて</option>
        </select>
        <button id="fit-button" class="control-button" type="button">表示範囲にズーム</button>
        <button id="geo-button" class="control-button" type="button">現在地へ</button>
        <select id="theme-select" class="select">
          <option value="light">タイル: Light</option>
          <option value="dark">タイル: Dark</option>
        </select>
      </div>
    </header>
    <div id="map"></div>
  </div>
  <div class="toast" id="toast">CSV を読み込み中…</div>
  <div class="legend" id="legend"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title">リスト (表示中のみ)</div>
      <div class="chip"><span id="list-count">0</span></div>
    </div>
    <div class="drawer-list" id="drawer-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const rawCsv = params.get("csv") || "/output/meatmap.csv";
    // 解釈ルール: 絶対URL/ルート始まりはそのまま。相対パスはルートに付ける。
    let csvUrl = rawCsv;
    if (!/^https?:\/\//i.test(rawCsv) && !rawCsv.startsWith("/")) {
      csvUrl = `/${rawCsv.replace(/^\.?\//, "")}`;
    }
    const rankColors = { S: "#e11d48", A: "#f97316", B: "#0ea5e9", C: "#94a3b8" };
    const map = L.map("map", { center: [35.681236, 139.767125], zoom: 11, preferCanvas: true });
    const tileLayers = {
      light: L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        attribution: "&copy; OpenStreetMap & CARTO",
        maxZoom: 19,
      }),
      dark: L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: "&copy; OpenStreetMap & CARTO",
        maxZoom: 19,
      }),
    };
    tileLayers.light.addTo(map);
    const cluster = L.markerClusterGroup({ chunkedLoading: true, spiderfyOnMaxZoom: true });
    map.addLayer(cluster);
    const markers = [];
    const genres = new Set();

    const toast = document.getElementById("toast");
    const csvLabel = document.getElementById("csv-label");
    const countLabel = document.getElementById("count-label");
    const legend = document.getElementById("legend");
    const drawerList = document.getElementById("drawer-list");
    const listCount = document.getElementById("list-count");
    const searchBox = document.getElementById("search-box");
    const genreSelect = document.getElementById("genre-select");
    const fitButton = document.getElementById("fit-button");
    const geoButton = document.getElementById("geo-button");
    const themeSelect = document.getElementById("theme-select");
    const updatedLabel = document.getElementById("updated-label");
    csvLabel.textContent = csvUrl;
    let rankTotals = { S: 0, A: 0, B: 0, C: 0 };
    let searchTerm = "";
    let selectedGenre = "";
    let userMarker = null;
    let userCircle = null;

    function showToast(msg) {
      toast.textContent = msg;
      toast.style.opacity = 1;
      setTimeout(() => { toast.style.opacity = 0; }, 3200);
    }

    function iconForRank(rank) {
      const color = rankColors[rank] || rankColors.C;
      const svg = encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='32' height='48' viewBox='0 0 32 48'><path d='M16 0C7 0 0 7 0 16c0 12 16 32 16 32s16-20 16-32C32 7 25 0 16 0z' fill='${color}'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='16' font-family='Inter, sans-serif' font-weight='700'>${rank || "?"}</text></svg>`);
      return L.icon({ iconUrl: `data:image/svg+xml,${svg}`, iconSize: [28, 42], iconAnchor: [14, 42], popupAnchor: [0, -36] });
    }

    function createPopup(row) {
      const rating = row.rating ? `★${row.rating} (${row.review_count || 0})` : "";
      const notes = row.notes ? `<div style="margin-top:4px; color:#cbd5e1;">${row.notes}</div>` : "";
      const url = row.url ? `<div style="margin-top:6px;"><a href="${row.url}" target="_blank" rel="noopener">公式/詳細</a></div>` : "";
      const rankBadge = `<span class="rank-badge" style="background:${rankColors[row.carnivore_rank] || "#cbd5e1"}">${row.carnivore_rank || "-"}</span>`;
      const genres = row.genre ? `<div style="color:#cbd5e1; margin-top:4px;">${row.genre}</div>` : "";
      const reviewBadge = row.review_count
        ? `<span style="display:inline-block; background:rgba(255,255,255,0.08); color:#cbd5e1; padding:4px 8px; border-radius:8px; font-size:12px;">${rating || "未評価"}</span>`
        : "";
      const urlButton = row.url
        ? `<a href="${row.url}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:6px; padding:8px 10px; background:${rankColors[row.carnivore_rank] || "#f97316"}; color:#0f172a; border-radius:8px; text-decoration:none; font-weight:700;">店舗ページ</a>`
        : "";
      return `
        <div style="min-width: 180px;">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
            <div style="font-weight:700; margin-bottom:4px;">${row.name || "名称不明"}</div>
            ${rankBadge}
          </div>
          <div style="color:#cbd5e1;">${row.address || "住所不明"}</div>
          <div style="margin-top:4px;">スコア: ${row.carnivore_score ?? "-"} / ランク: <strong>${row.carnivore_rank || "-"}</strong></div>
          ${genres}
          <div style="margin-top:4px; display:flex; gap:6px; align-items:center;">${reviewBadge}</div>
          ${notes}
          <div style="margin-top:8px;">${urlButton}</div>
        </div>
      `;
    }

    function applyFilter() {
      const allowed = Array.from(document.querySelectorAll('input[data-rank]'))
        .filter(cb => cb.checked)
        .map(cb => cb.getAttribute("data-rank"));
      cluster.clearLayers();
      const visibleByRank = { S: 0, A: 0, B: 0, C: 0 };
      let visible = 0;
      markers.forEach(marker => {
        const rank = marker.rank || marker.options.rank || "C";
        const meta = marker.meta || {};
        const haystack = (meta.name + " " + meta.address + " " + meta.genreText).toLowerCase();
        const searchOk = !searchTerm || haystack.includes(searchTerm);
        const genreOk = !selectedGenre || (meta.genreText || "").toLowerCase().includes(selectedGenre);
        if (allowed.includes(rank) && searchOk && genreOk) {
          cluster.addLayer(marker);
          visibleByRank[rank] = (visibleByRank[rank] || 0) + 1;
          visible += 1;
        }
      });
      countLabel.textContent = `${visible} / ${markers.length}`;
      renderLegend(visibleByRank);
      renderList(allowed);
      showToast(`表示中 ${visible} 件 / ランク: ${allowed.join(", ")}`);
    }

    async function loadCsv() {
      showToast("CSV を読み込み中…");
      rankTotals = { S: 0, A: 0, B: 0, C: 0 };
      genres.clear();
      try {
        const res = await fetch(csvUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const meta = {};
        text.split(/\r?\n/).forEach(line => {
          if (line.startsWith("#")) {
            const kv = line.replace(/^#\s*/, "");
            const [k, v] = kv.split("=", 2);
            if (k && v !== undefined) meta[k.trim()] = v.trim();
          }
        });
        if (meta.generated_at_utc) {
          updatedLabel.textContent = meta.generated_at_utc;
        }
        const result = Papa.parse(text, {
          header: true,
          dynamicTyping: true,
          skipEmptyLines: true,
          comments: "#",
        });
        cluster.clearLayers();
        markers.length = 0;
        const rows = result.data || [];
        let added = 0;
        rows.forEach(row => {
          const lat = parseFloat(row.lat);
          const lng = parseFloat(row.lng);
          if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
          const rank = row.carnivore_rank || "C";
          rankTotals[rank] = (rankTotals[rank] || 0) + 1;
          const genreText = (row.genre || "").trim();
          genreText.split(",").map(g => g.trim()).filter(Boolean).forEach(g => genres.add(g));
          const marker = L.marker([lat, lng], { icon: iconForRank(rank), rank });
          marker.rank = rank; // keep rank on instance for filtering/legend
          marker.meta = {
            name: row.name || "",
            address: row.address || "",
            genreText,
          };
          marker.bindPopup(createPopup(row));
          markers.push(marker);
          added += 1;
        });
        countLabel.textContent = `${added} / ${markers.length}`;
        populateGenreOptions();
        renderLegend(rankTotals);
        showToast(`読み込み完了: ${added} 件`);
        applyFilter();
      } catch (err) {
        showToast("CSV 読み込みに失敗しました");
        console.error("CSV fetch/parse error", err);
      }
    }

    document.querySelectorAll('input[data-rank]').forEach(cb => cb.addEventListener("change", applyFilter));
    searchBox.addEventListener("input", () => {
      searchTerm = searchBox.value.trim().toLowerCase();
      applyFilter();
    });
    genreSelect.addEventListener("change", () => {
      selectedGenre = genreSelect.value.trim().toLowerCase();
      applyFilter();
    });
    fitButton.addEventListener("click", () => {
      if (cluster.getLayers().length > 0) {
        map.fitBounds(cluster.getBounds(), { padding: [24, 24] });
      }
    });
    geoButton.addEventListener("click", () => {
      if (!navigator.geolocation) {
        showToast("位置情報に対応していません");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          if (userMarker) {
            map.removeLayer(userMarker);
          }
          if (userCircle) {
            map.removeLayer(userCircle);
          }
          userMarker = L.marker([latitude, longitude], { icon: iconForRank("C") });
          userCircle = L.circle([latitude, longitude], { radius: accuracy || 120, color: "#0ea5e9", fillOpacity: 0.1 });
          userMarker.addTo(map);
          userCircle.addTo(map);
        map.setView([latitude, longitude], 15);
        showToast("現在地を表示しました");
      },
      () => showToast("現在地の取得に失敗しました"),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
    themeSelect.addEventListener("change", () => {
      const theme = themeSelect.value || "light";
      Object.values(tileLayers).forEach(layer => map.removeLayer(layer));
      const layer = tileLayers[theme] || tileLayers.light;
      layer.addTo(map);
    });
    loadCsv();

    function renderLegend(counts) {
      const ranks = ["S", "A", "B", "C"];
      const lines = ranks.map(rank => {
        const total = rankTotals[rank] || 0;
        const visible = counts ? counts[rank] || 0 : total;
        return `<div class="legend-row">
          <span class="legend-color" style="background:${rankColors[rank] || "#94a3b8"}"></span>
          <span class="legend-label">${rank}</span>
          <span class="legend-count">${visible} / ${total}</span>
        </div>`;
      });
      legend.innerHTML = `<div class="legend-title">ランク別 件数 (表示/総数)</div>${lines.join("")}`;
    }

    function populateGenreOptions() {
      const sorted = Array.from(genres).sort((a, b) => a.localeCompare(b, "ja"));
      const options = ['<option value="">ジャンル: すべて</option>'].concat(
        sorted.map(g => `<option value="${g}">${g}</option>`)
      );
      genreSelect.innerHTML = options.join("");
    }

    function renderList(allowedRanks) {
      const rows = [];
      markers.forEach(marker => {
        const rank = marker.rank || marker.options.rank || "C";
        const meta = marker.meta || {};
        const haystack = (meta.name + " " + meta.address + " " + meta.genreText).toLowerCase();
        const searchOk = !searchTerm || haystack.includes(searchTerm);
        const genreOk = !selectedGenre || (meta.genreText || "").toLowerCase().includes(selectedGenre);
        if (!allowedRanks.includes(rank) || !searchOk || !genreOk) return;
        rows.push({
          name: meta.name || "(名称不明)",
          address: meta.address || "",
          genreText: meta.genreText || "",
          rank,
          marker,
        });
      });
      rows.sort((a, b) => (a.rank || "").localeCompare(b.rank || "")); // rankで簡易ソート
      listCount.textContent = rows.length;
      drawerList.innerHTML = rows
        .map(row => {
          const badgeColor = rankColors[row.rank] || "#cbd5e1";
          return `<div class="list-item" data-rank="${row.rank}">
            <div class="list-name">${row.name}</div>
            <div class="list-meta">${row.address}</div>
            <div class="list-meta">${row.genreText}</div>
            <div class="rank-badge" style="background:${badgeColor}"> ${row.rank} </div>
          </div>`;
        })
        .join("");
      Array.from(drawerList.querySelectorAll(".list-item")).forEach((item, idx) => {
        item.addEventListener("click", () => {
          const row = rows[idx];
          if (row && row.marker) {
            map.setView(row.marker.getLatLng(), 16);
            row.marker.openPopup();
          }
        });
      });
    }
  </script>
</body>
</html>
